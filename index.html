<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Spurriemök">
  <meta name="theme-color" content="#7ec8e3">
  <meta name="description" content="Declaratieformulier V.V. de Spurriemök Oirlo">
  <title>Declaratie – Spurriemökken</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;min-height:100vh;min-height:100dvh;
      background:linear-gradient(180deg,#7ec8e3 0%,#b5dff0 40%,#d4ecf7 60%,#e8f4e2 75%,#4a9e2f 75%,#3d8526 78%,#2d6e1a 100%);
      background-attachment:fixed;color:#2a2a2a;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}

    .clouds{position:fixed;top:0;left:0;right:0;height:300px;pointer-events:none;z-index:0;overflow:hidden}
    .cloud{position:absolute;background:#fff;border-radius:50%;opacity:.85}
    .cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
    .c1{width:200px;height:60px;top:40px;left:5%;animation:drift 35s linear infinite}
    .c1::before{width:100px;height:80px;top:-40px;left:30px}.c1::after{width:120px;height:70px;top:-30px;left:80px}
    .c2{width:160px;height:50px;top:90px;right:10%;animation:drift 45s linear infinite reverse}
    .c2::before{width:80px;height:65px;top:-35px;left:20px}.c2::after{width:100px;height:55px;top:-25px;left:60px}
    .c3{width:180px;height:55px;top:20px;left:45%;animation:drift 50s linear infinite}
    .c3::before{width:90px;height:70px;top:-38px;left:25px}.c3::after{width:110px;height:60px;top:-28px;left:70px}
    @keyframes drift{from{transform:translateX(-100px)}to{transform:translateX(calc(100vw + 100px))}}

    .grass{position:fixed;bottom:0;left:0;right:0;height:80px;pointer-events:none;z-index:0}
    .grass svg{width:100%;height:100%}

    .fence{position:fixed;bottom:40px;left:0;right:0;height:50px;pointer-events:none;z-index:0;display:flex;justify-content:center;gap:18px;padding:0 10px;opacity:.7}
    .fence-post{width:10px;height:45px;background:#fff;border-radius:2px;position:relative}
    .fence-post::before{content:'';position:absolute;top:8px;left:-8px;width:26px;height:5px;background:#fff;border-radius:2px}
    .fence-post::after{content:'';position:absolute;top:25px;left:-8px;width:26px;height:5px;background:#fff;border-radius:2px}

    .page-content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px 16px 100px}

    .header{text-align:center;padding:20px 0 10px}
    .logo-img{width:130px;height:auto;margin:0 auto 12px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
    .header h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;color:#fff;text-shadow:2px 2px 8px rgba(0,0,0,.3);margin-bottom:2px}
    .header p{font-size:.95rem;font-weight:700;color:rgba(255,255,255,.9);text-shadow:1px 1px 4px rgba(0,0,0,.2)}

    .install-banner{display:none;background:#c0392b;padding:12px 20px;text-align:center;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer;border-radius:10px;margin-bottom:12px}
    .install-banner span{text-decoration:underline}.install-banner.show{display:block}

    .card{background:#c0392b;border-radius:16px;padding:24px 20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .card.blue{background:linear-gradient(135deg,#a8d8ea 0%,#88c4e0 100%);color:#1a3a4a}
    .card-title{font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px;color:#fff;display:flex;align-items:center;gap:8px}
    .card.blue .card-title{color:#1a3a4a}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    @media(max-width:500px){.form-grid{grid-template-columns:1fr}}
    .field label{display:block;font-size:.72rem;font-weight:800;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .card.blue .field label{color:rgba(26,58,74,.6)}
    .field input,.field select{width:100%;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;border:2px solid rgba(255,255,255,.3);border-radius:10px;background:rgba(255,255,255,.9);color:#2a2a2a;transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none}
    .field input:focus,.field select:focus{border-color:#f0c530;box-shadow:0 0 0 3px rgba(240,197,48,.3)}
    .field input::placeholder{color:#999}
    .card.blue .field input,.card.blue .field select{border-color:rgba(26,58,74,.15);background:#fff}

    .line-items-list{display:flex;flex-direction:column;gap:8px}
    .line-item{background:rgba(255,255,255,.9);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:12px;display:grid;gap:8px;animation:pop .25s ease-out}
    .card.blue .line-item{border-color:rgba(26,58,74,.1);background:#fff}
    .li-row-top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
    .li-row-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    @media(max-width:500px){.li-row-bottom{grid-template-columns:1fr}}
    .li-label{font-size:.68rem;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
    .line-item input,.line-item select{width:100%;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;border:2px solid #e0e0e0;border-radius:8px;background:#fafafa;color:#2a2a2a;outline:none;-webkit-appearance:none;transition:border-color .2s}
    .line-item input:focus,.line-item select:focus{border-color:#f0c530;box-shadow:0 0 0 3px rgba(240,197,48,.2)}
    .line-item input::placeholder{color:#bbb}
    .line-item input[type="number"]{text-align:right;font-variant-numeric:tabular-nums}
    .line-item select option{background:#fff;color:#2a2a2a}

    .btn-rm{background:none;border:2px solid transparent;color:#ccc;font-size:1.2rem;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;align-self:end}
    .btn-rm:hover{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,.08)}

    .btn-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;margin-top:8px;background:rgba(255,255,255,.4);border:2px dashed rgba(255,255,255,.5);border-radius:10px;color:rgba(255,255,255,.9);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-add:hover{background:rgba(255,255,255,.6);border-color:#fff;color:#c0392b}
    .card.blue .btn-add{color:rgba(26,58,74,.5);border-color:rgba(26,58,74,.2);background:rgba(255,255,255,.4)}
    .card.blue .btn-add:hover{color:#1a3a4a;border-color:rgba(26,58,74,.4)}

    .totals{display:flex;justify-content:space-between;align-items:center;padding:16px 0 0;border-top:2px solid rgba(255,255,255,.2);margin-top:14px;flex-wrap:wrap;gap:10px}
    .card.blue .totals{border-color:rgba(26,58,74,.1)}
    .total-item{text-align:center;flex:1;min-width:80px}
    .t-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6);font-weight:800;margin-bottom:2px}
    .card.blue .t-label{color:rgba(26,58,74,.4)}
    .t-value{font-size:1.25rem;font-weight:900}
    .card.blue .t-value.pos{color:#27ae60}.card.blue .t-value.neg{color:#c0392b}.card.blue .t-value.net{color:#2c3e50}

    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px}
    .photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.3);background:#fff}
    .photo-thumb img{width:100%;height:100%;object-fit:cover}
    .photo-thumb .rm-photo{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .photo-thumb .rm-photo:hover{background:#c0392b}
    .photo-thumb .ph-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:.6rem;padding:2px 5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .photo-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-photo{display:flex;align-items:center;justify-content:center;gap:5px;flex:1;min-width:130px;padding:11px;background:rgba(255,255,255,.4);border:2px dashed rgba(255,255,255,.5);border-radius:10px;color:rgba(255,255,255,.9);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-photo:hover{background:rgba(255,255,255,.6);color:#c0392b;border-color:#fff}
    .photo-input{display:none}

    .remarks textarea{width:100%;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:600;border:2px solid rgba(255,255,255,.3);border-radius:10px;background:rgba(255,255,255,.9);color:#2a2a2a;resize:vertical;min-height:65px;outline:none;transition:border-color .2s}
    .remarks textarea:focus{border-color:#f0c530;box-shadow:0 0 0 3px rgba(240,197,48,.3)}
    .remarks textarea::placeholder{color:#999}
    .remarks label{display:block;font-size:.72rem;font-weight:800;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}

    .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    .btn-main{flex:1;min-width:180px;display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#c0392b,#a93226);border:none;border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(192,57,43,.3)}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(192,57,43,.4)}
    .btn-main:active{transform:translateY(0)}.btn-main:disabled{opacity:.5;pointer-events:none}
    .btn-wis{padding:16px 20px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:#fff;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);border-radius:12px;cursor:pointer;transition:all .2s}
    .btn-wis:hover{background:rgba(255,255,255,.35);border-color:#fff}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:#fff;color:#2a2a2a;padding:14px 24px;border-radius:12px;font-weight:700;font-size:.9rem;box-shadow:0 4px 24px rgba(0,0,0,.2);border:2px solid #e0e0e0;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);z-index:1000;text-align:center;max-width:90vw}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.ok{border-color:#27ae60}.toast.err{border-color:#c0392b}

    .footer{text-align:center;padding:20px;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.6)}
    .footer a{color:#fff;text-decoration:none}

    @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
    @supports(-webkit-touch-callout:none){input,select,textarea{font-size:16px!important}}
  </style>
</head>

  <div class="fence" id="fence"></div>

    </div>

    <div class="card">
      <div class="card-title">💬 Opmerkingen</div>
      <div class="remarks"><label>Toelichting (optioneel)</label><textarea id="opmerkingen" placeholder="Eventuele toelichting of bijzonderheden..."></textarea></div>
    </div>

    <div class="actions">
      <button type="button" class="btn-main" id="btnPdf" onclick="generatePDF()">📄 Maak PDF &amp; verstuur</button>
      <button type="button" class="btn-wis" onclick="resetForm()">Wissen</button>
    </div>
    <div class="footer">© 2026 <a href="https://www.spurriemok.nl">V.V. de Spurriemök</a> · Oeldere</div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const ACT=['— Selecteer —','Bonte Aovend','Prinseproclamasie','JVV','Prinserecepsie','Jeugdrecepsie','Jeugdbontemiddag','Mokkebal','Zondag','Maandag','Dinsdag','Prinsewage','Carnavalskrant','Klier','Raod','Verzekering','Overige'];
let rc=0;

(function(){const f=document.getElementById('fence');const n=Math.ceil(window.innerWidth/28);for(let i=0;i<n;i++){const p=document.createElement('div');p.className='fence-post';f.appendChild(p)}})();

function addRow(){
  rc++;const l=document.getElementById('lineItemsList');const d=document.createElement('div');d.className='line-item';
  const opts=ACT.map((o,i)=>`<option value="${i?o:''}">${o}</option>`).join('');
  d.innerHTML=`<div class="li-row-top"><div><div class="li-label">Omschrijving</div><input type="text" class="inp-o" placeholder="Bijv. Stoffen voor optocht"></div><button type="button" class="btn-rm" onclick="rmRow(this)" title="Verwijder">×</button></div><div class="li-row-bottom"><div><div class="li-label">Activiteit</div><select class="inp-g">${opts}</select></div><div><div class="li-label">Te ontvangen (€)</div><input type="number" class="inp-on" step="0.01" min="0" placeholder="0,00" oninput="calc()"></div><div><div class="li-label">Te betalen (€)</div><input type="number" class="inp-b" step="0.01" min="0" placeholder="0,00" oninput="calc()"></div></div>`;
  l.appendChild(d);
}
function rmRow(b){b.closest('.line-item').remove();calc();if(!document.querySelectorAll('.line-item').length)addRow()}
function calc(){
  let tb=0,to=0;document.querySelectorAll('.line-item').forEach(i=>{tb+=parseFloat(i.querySelector('.inp-b').value)||0;to+=parseFloat(i.querySelector('.inp-on').value)||0});
  const s=to-tb;document.getElementById('totalBetalen').textContent=eur(tb);document.getElementById('totalOntvangen').textContent=eur(to);
  const el=document.getElementById('totalSaldo');el.textContent=(s>=0?'+ ':'- ')+eur(Math.abs(s));el.className='t-value '+(s>=0?'pos':'neg');
}

let photos=[];
function handlePhotos(input){
  Array.from(input.files).forEach(file=>{if(!file.type.startsWith('image/'))return;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const MAX=1200;let w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX}else{w=Math.round(w*MAX/h);h=MAX}}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);photos.push({name:file.name,dataUrl:canvas.toDataURL('image/jpeg',.8),w,h});renderPhotos()};img.src=e.target.result};reader.readAsDataURL(file)});input.value='';
}
function removePhoto(i){photos.splice(i,1);renderPhotos()}
function renderPhotos(){document.getElementById('photoGrid').innerHTML=photos.map((p,i)=>`<div class="photo-thumb"><img src="${p.dataUrl}" alt="${p.name}"><button class="rm-photo" onclick="removePhoto(${i})">×</button><div class="ph-name">${p.name}</div></div>`).join('')}

function eur(v){return'€ '+v.toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2})}
function formatIBAN(e){let v=e.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();e.value=v.match(/.{1,4}/g)?.join(' ')||v}
function fd(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}-${m}-${y}`}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),4000)}

function validate(){
  const datum=document.getElementById('datum').value,naam=document.getElementById('naam').value.trim(),iban=document.getElementById('iban').value.trim();
  if(!datum){toast('Vul een datum in.','err');return false}if(!naam){toast('Vul je naam in.','err');return false}
  if(!iban||iban.replace(/\s/g,'').length<15){toast('Vul een geldig IBAN in.','err');return false}
  let ok=false;document.querySelectorAll('.line-item').forEach(i=>{const o=i.querySelector('.inp-o').value.trim();const b=parseFloat(i.querySelector('.inp-b').value)||0;const on=parseFloat(i.querySelector('.inp-on').value)||0;if(o&&(b>0||on>0))ok=true});
  if(!ok){toast('Vul minstens één complete regel in.','err');return false}return true;
}

function generatePDF(){
  if(!validate())return;const btn=document.getElementById('btnPdf');btn.disabled=true;btn.textContent='⏳ PDF genereren...';
  setTimeout(()=>{try{_buildPDF()}catch(err){console.error(err);toast('Fout bij PDF: '+err.message,'err')}finally{btn.disabled=false;btn.innerHTML='📄 Maak PDF &amp; verstuur'}},100);
}

function _buildPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=20;let y=M;
  doc.setFillColor(192,57,43);doc.rect(0,0,W/3,4,'F');doc.setFillColor(240,197,48);doc.rect(W/3,0,W/3,4,'F');doc.setFillColor(45,143,69);doc.rect(2*W/3,0,W/3,4,'F');y=14;
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(33,33,33);doc.text('Declaratieformulier',M,y);y+=7;
  doc.setFontSize(11);doc.setTextColor(120,120,120);doc.text('V.V. de Spurriemök · Oeldere',M,y);y+=10;
  doc.setDrawColor(220,220,220);doc.setFillColor(248,248,248);doc.roundedRect(M,y,W-2*M,42,3,3,'FD');y+=7;
  const datum=document.getElementById('datum').value,naam=document.getElementById('naam').value.trim();
  const telefoon=document.getElementById('telefoon').value.trim(),email=document.getElementById('email').value.trim(),iban=document.getElementById('iban').value.trim();
  const c1=M+5,c2=M+90;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(130,130,130);doc.text('DATUM',c1,y);doc.text('NAAM',c2,y);y+=5;
  doc.setFontSize(10);doc.setTextColor(33,33,33);doc.setFont('helvetica','bold');doc.text(fd(datum),c1,y);doc.text(naam,c2,y);y+=8;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(130,130,130);doc.text('06-NUMMER',c1,y);doc.text('E-MAIL',c2,y);y+=5;
  doc.setFontSize(10);doc.setTextColor(33,33,33);doc.setFont('helvetica','bold');doc.text(telefoon||'–',c1,y);doc.text(email||'–',c2,y);y+=8;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(130,130,130);doc.text('IBAN',c1,y);y+=5;
  doc.setFontSize(10);doc.setTextColor(33,33,33);doc.setFont('helvetica','bold');doc.text(iban,c1,y);y+=12;
  const rows=[];let tB=0,tO=0;
  document.querySelectorAll('.line-item').forEach(item=>{const o=item.querySelector('.inp-o').value.trim(),g=item.querySelector('.inp-g').value;const b=parseFloat(item.querySelector('.inp-b').value)||0,on=parseFloat(item.querySelector('.inp-on').value)||0;if(o&&(b>0||on>0)){tB+=b;tO+=on;rows.push([o,g||'–',on>0?eur(on):'',b>0?eur(b):''])}});
  doc.autoTable({startY:y,margin:{left:M,right:M},head:[['Omschrijving','Activiteit','Te ontvangen','Te betalen']],body:rows,foot:[['','Totaal',eur(tO),eur(tB)]],headStyles:{fillColor:[192,57,43],textColor:[255,255,255],fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9,textColor:[50,50,50]},footStyles:{fillColor:[248,248,248],textColor:[33,33,33],fontStyle:'bold',fontSize:9},alternateRowStyles:{fillColor:[252,252,252]},columnStyles:{0:{cellWidth:55},2:{halign:'right'},3:{halign:'right'}},theme:'grid',styles:{lineColor:[220,220,220],lineWidth:.3}});
  y=doc.lastAutoTable.finalY+6;const saldo=tO-tB;
  doc.setFillColor(saldo>=0?39:192,saldo>=0?174:57,saldo>=0?96:43);doc.roundedRect(W-M-65,y,65,10,2,2,'F');
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text('Saldo: '+(saldo>=0?'+':'-')+' '+eur(Math.abs(saldo)),W-M-62,y+7);y+=16;
  const opm=document.getElementById('opmerkingen').value.trim();
  if(opm){if(y>H-40){doc.addPage();y=M}doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(130,130,130);doc.text('OPMERKINGEN',M,y);y+=5;doc.setFontSize(9);doc.setTextColor(50,50,50);const lines=doc.splitTextToSize(opm,W-2*M);doc.text(lines,M,y);y+=lines.length*4.5+6}
  if(photos.length>0){photos.forEach((photo,idx)=>{doc.addPage();doc.setFillColor(192,57,43);doc.rect(0,0,W/3,3,'F');doc.setFillColor(240,197,48);doc.rect(W/3,0,W/3,3,'F');doc.setFillColor(45,143,69);doc.rect(2*W/3,0,W/3,3,'F');let py=12;doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(33,33,33);doc.text(`Bijlage ${idx+1}: ${photo.name}`,M,py);py+=6;const maxW=W-2*M,maxH=H-py-M;let imgW=photo.w*.264,imgH=photo.h*.264;const scale=Math.min(maxW/imgW,maxH/imgH,1);imgW*=scale;imgH*=scale;try{doc.addImage(photo.dataUrl,'JPEG',M,py,imgW,imgH)}catch(e){doc.setFontSize(9);doc.setTextColor(200,0,0);doc.text('Foto kon niet worden toegevoegd.',M,py+10)}})}
  const pc=doc.internal.getNumberOfPages();for(let p=1;p<=pc;p++){doc.setPage(p);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);doc.text(`Declaratie ${naam} · ${fd(datum)} · Pagina ${p}/${pc}`,M,H-8)}
  const fileName=`Declaratie_${naam.replace(/\s+/g,'_')}_${datum}.pdf`;const pdfBlob=doc.output('blob');const pdfFile=new File([pdfBlob],fileName,{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[pdfFile]})){navigator.share({title:`Declaratie ${naam}`,text:`Declaratie van ${naam} d.d. ${fd(datum)}`,files:[pdfFile]}).then(()=>toast('PDF gedeeld!')).catch(err=>{if(err.name!=='AbortError'){doc.save(fileName);toast('PDF gedownload! Stuur naar penningmeester@spurriemok.nl')}})}else{doc.save(fileName);toast('PDF gedownload! Stuur naar penningmeester@spurriemok.nl')}
}

function resetForm(){if(!confirm("Formulier wissen?"))return;['naam','telefoon','email','iban','opmerkingen'].forEach(id=>document.getElementById(id).value='');document.getElementById('lineItemsList').innerHTML='';rc=0;photos=[];renderPhotos();addRow();calc();document.getElementById('datum').value=new Date().toISOString().split('T')[0];toast('Formulier gewist.')}

let dp;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('installBanner').classList.add('show')});
function installPWA(){if(dp){dp.prompt();dp.userChoice.then(()=>{document.getElementById('installBanner').classList.remove('show');dp=null})}}
if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream&&window.navigator.standalone!==true){setTimeout(()=>toast('Tip: Tik op Delen ⎙ → Zet op beginscherm'),2500)}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('datum').value=new Date().toISOString().split('T')[0];addRow()});
</script>
</body>
</html>
